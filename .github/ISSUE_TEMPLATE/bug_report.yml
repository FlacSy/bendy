name: Bug report
description: Something doesn't work as expected
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: manifest
    attributes:
      label: Manifest (if relevant)
      description: The manifest that triggers the bug.
      render: python

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Error output or incorrect generated code.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: bendykit version
      placeholder: "0.1.0"
    validations:
      required: true
